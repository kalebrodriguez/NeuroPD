# Conservative preprocessing profile (spec Section 10; see ADR 0005 for justification).
# Values validated by neuropd.config.PreprocessingConfig. Line frequency is per-dataset
# (ds002778=60 Hz, ds007526=50 Hz; ADR 0004) and supplied at runtime, not here.
name: conservative
bandpass_low_hz: 1.0        # remove slow drift; stabilizes referencing
bandpass_high_hz: 40.0      # below 50/60 Hz mains and EMG; covers delta..beta
apply_notch: true           # notch at the per-dataset line frequency (ADR 0004)
resample_hz: 250.0          # shared rate (ds007526 native; ds002778 512 -> 250)
reference: average          # average reference (matches Jackson 2019 for ds002778)
montage: standard_1005
epoch_length_s: 2.0         # fixed-length non-overlapping epochs
epoch_overlap: 0.0
reject_peak_to_peak_uv: 150.0   # drop epochs exceeding 150 uV peak-to-peak
flat_peak_to_peak_uv: 1.0       # drop near-flat epochs (< 1 uV p2p)
min_recording_duration_s: 60.0  # exclude recordings shorter than 1 min
min_clean_epochs: 20            # exclude participants with < 20 clean epochs
