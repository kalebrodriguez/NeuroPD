# Interpretable feature configuration (spec Section 12).
# Frequency-band boundaries live here by design. These are widely-used PROVISIONAL
# defaults to be confirmed in Milestone 3 against data quality (e.g. include gamma
# only if filtering/quality support it). Units: Hz.
bands:
  delta: [1.0, 4.0]
  theta: [4.0, 8.0]
  alpha: [8.0, 13.0]
  beta: [13.0, 30.0]
  # gamma enabled only if recording quality and filtering support it (Section 12.1).
  gamma: null

spectral:
  absolute_power: true
  relative_power: true
  log_power: true
  peak_alpha_frequency: true
  spectral_edge_frequency: true
  theta_alpha_ratio: true
  delta_alpha_ratio: true
  aperiodic: null            # slope/offset only if reliably estimable (Section 12.1)

complexity:
  spectral_entropy: true
  permutation_entropy: true
  hjorth: true               # activity, mobility, complexity

connectivity:
  enabled: false             # optional initial connectivity (Section 12.3)

aggregation:
  # Epoch-level -> participant-level, robust statistics (Section 12.4).
  statistics: [median, iqr]
